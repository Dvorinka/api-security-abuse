# Coolify Deployment Configuration
# SecurityAbuse API Service

services:
  - name: security-abuse-api
    type: docker
    image: security-abuse-api:latest
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - SECURITY_ABUSE_API_KEY={{SECURITY_ABUSE_API_KEY}}
      - RAPIDAPI_PROXY_SECRET={{RAPIDAPI_PROXY_SECRET}}
    health_check:
      path: /healthz
      interval: 30
      timeout: 10
      retries: 3
    resources:
      memory: 128Mi
      cpu: 100m
    restart_policy: unless-stopped
    networks:
      - api-network

# Network Configuration
networks:
  api-network:
    driver: bridge

# Deployment Settings
deployment:
  replicas: 1
  strategy: rolling
  rollback_on_failure: true

# Monitoring
monitoring:
  metrics:
    enabled: true
    path: /metrics
  logging:
    driver: json-file
    max_size: 10m
    max_files: 3
